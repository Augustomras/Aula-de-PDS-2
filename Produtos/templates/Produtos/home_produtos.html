<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Produtos - Mercado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }


    body {
      background: #f5f7fb;
      color: #333;
      display: flex;
    }


    /* Sidebar */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      padding: 20px;
    }


    .sidebar h2 {
      font-size: 20px;
      margin-bottom: 30px;
      color: #4a90e2;
    }


    .menu a {
      display: block;
      padding: 12px;
      margin-bottom: 10px;
      text-decoration: none;
      color: #555;
      border-radius: 8px;
      transition: 0.2s;
    }


    .menu a:hover {
      background: #f0f4ff;
      color: #4a90e2;
    }


    /* Main */
    .main {
      flex: 1;
      padding: 30px;
    }


    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }


    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }


    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }


    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }


    .card h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
    }


    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #4a90e2;
    }


    /* Table */
    .table-container {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }


    table {
      width: 100%;
      border-collapse: collapse;
    }


    th, td {
      padding: 12px;
      text-align: left;
    }


    th {
      color: #888;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }


    td {
      border-bottom: 1px solid #f0f0f0;
    }


    tr:hover {
      background: #fafafa;
    }


    /* Responsivo */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>


<body>


  <div class="sidebar">
    <h2>Mercado</h2>
    <div class="menu">
      <a href="{% url 'home' %}">Dashboard</a>
      <a href="{% url 'Produtos:home' %}">Produtos</a>
      <a href="#">Clientes</a>
      <a href="#">Vendas</a>
      <a href="#">Compras</a>
    </div>
  </div>


  <div class="main">
    <div class="header">
      <h1>Home</h1>
      <span id="dataAtual"></span>
    </div>


  </div>


  <script>
    // Simulação de dados (substituir com dados do Django depois)
    const dados = {
      produtos: 120,
      clientes: 45,
      vendas: 3200,
      compras: 1800,
      ultimasVendas: [
        {cliente: "João", produto: "Arroz", valor: 25, data: "15/04"},
        {cliente: "Maria", produto: "Feijão", valor: 18, data: "15/04"},
        {cliente: "Carlos", produto: "Óleo", valor: 10, data: "14/04"}
      ]
    };


    document.getElementById("produtos").innerText = dados.produtos;
    document.getElementById("clientes").innerText = dados.clientes;
    document.getElementById("vendas").innerText = "R$ " + dados.vendas;
    document.getElementById("compras").innerText = "R$ " + dados.compras;


    const tabela = document.getElementById("tabelaVendas");


    dados.ultimasVendas.forEach(venda => {
      const row = `
        <tr>
          <td>${venda.cliente}</td>
          <td>${venda.produto}</td>
          <td>R$ ${venda.valor}</td>
          <td>${venda.data}</td>
        </tr>
      `;
      tabela.innerHTML += row;
    });


    // Data atual
    const data = new Date();
    document.getElementById("dataAtual").innerText =
      data.toLocaleDateString("pt-BR");
  </script>


</body>
</html>
